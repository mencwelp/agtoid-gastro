<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#090d16"/>
  <!-- Decorative background glow -->
  <circle cx="256" cy="256" r="200" fill="url(#bg-glow)" opacity="0.15"/>
  
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leaf-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="basket-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Group of the Logo -->
  <g transform="translate(0, -10)">
    <!-- Lettuce leaf back -->
    <path d="M 210,130 C 160,130 140,180 180,240 C 220,300 290,300 310,240 C 330,180 300,130 250,130 Z" fill="url(#leaf-grad)" opacity="0.85" />
    <path d="M 280,110 C 240,90 200,130 220,190 C 240,250 310,240 320,190 C 330,140 310,120 280,110 Z" fill="#4ade80" opacity="0.7" />
    <path d="M 230,140 C 200,110 160,160 190,210 C 220,260 270,250 280,210 C 290,170 260,170 230,140 Z" fill="#22c55e" opacity="0.9" />

    <!-- Basket container in foreground -->
    <path d="M 120,240 L 392,240 L 360,380 C 355,400 335,410 315,410 L 197,410 C 177,410 157,400 152,380 Z" fill="url(#basket-grad)" />
    <!-- Basket Grid details -->
    <path d="M 160,270 L 352,270 M 170,310 L 342,310 M 180,350 L 332,350" stroke="#04385c" stroke-width="6" stroke-linecap="round" opacity="0.4" />
    <!-- Vertical wire lines -->
    <path d="M 200,240 L 215,410 M 256,240 L 256,410 M 312,240 L 297,410" stroke="#04385c" stroke-width="6" stroke-linecap="round" opacity="0.4" />
    
    <!-- Basket Handle -->
    <path d="M 140,240 C 140,140 372,140 372,240" fill="none" stroke="#e0f2fe" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
  </g>
</svg>
