<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#090d16" />

  <!-- Left Sidebar Area -->
  <rect x="0" y="0" width="260" height="720" fill="#0f172a" stroke-right="#1e293b" stroke-width="1.5" />
  
  <!-- Sidebar Header logo -->
  <circle cx="60" cy="50" r="16" fill="#22c55e" opacity="0.9" />
  <text x="90" y="56" fill="#ffffff" font-family="sans-serif" font-weight="900" font-size="16" letter-spacing="1.5">COMPRAS GASTRO</text>
  <line x1="20" y1="85" x2="240" y2="85" stroke="#1e293b" />

  <!-- Sidebar Nav List -->
  <rect x="15" y="110" width="230" height="40" rx="8" fill="#1e293b" />
  <text x="35" y="135" fill="#38bdf8" font-family="sans-serif" font-weight="bold" font-size="13">🛒 Aktywne Zamówienia</text>
  
  <text x="35" y="195" fill="#94a3b8" font-family="sans-serif" font-weight="500" font-size="13">📦 Zarządzaj Katalogiem</text>
  <text x="35" y="255" fill="#94a3b8" font-family="sans-serif" font-weight="500" font-size="13">🥦 Edytor Kategorii</text>
  <text x="35" y="315" fill="#94a3b8" font-family="sans-serif" font-weight="500" font-size="13">☁️ Sincronização G-Drive</text>

  <!-- Left Sidebar Footer Info -->
  <rect x="20" y="650" width="220" height="45" rx="8" fill="#1e293b" opacity="0.5" stroke="#334155" />
  <circle cx="40" cy="672" r="5" fill="#4ade80" />
  <text x="55" y="677" fill="#cbd5e1" font-family="sans-serif" font-size="11">Działa w tle / Offline Ready</text>

  <!-- Main Content Space -->
  <!-- Top Bar Layout header -->
  <rect x="260" y="0" width="1020" height="85" fill="#0f172a" />
  <text x="295" y="50" fill="#ffffff" font-family="sans-serif" font-weight="800" font-size="20">Szybki Portfel Gastronomiczny</text>
  <text x="1060" y="48" fill="#38bdf8" font-family="sans-serif" font-size="11" font-weight="bold">AUTORYZACJA OK</text>
  <rect x="1175" y="30" width="75" height="26" rx="13" fill="#15803d" />
  <text x="1192" y="46" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="10">ONLINE</text>

  <!-- Dashboard Overview Cards -->
  <!-- Card #1 Left -->
  <rect x="295" y="115" width="450" height="230" rx="16" fill="#0f172a" stroke="#1e293b" stroke-width="2" />
  <text x="325" y="155" fill="#38bdf8" font-family="sans-serif" font-weight="bold" font-size="12" letter-spacing="1.5">DANE SYSTEMOWE</text>
  <text x="325" y="195" fill="#ffffff" font-family="sans-serif" font-weight="800" font-size="34">Aktywne orders: 0</text>
  <text x="325" y="240" fill="#94a3b8" font-family="sans-serif" font-size="12">Szybkie przełączanie operacji pomiędzy adminem a kurierem.</text>
  <text x="325" y="265" fill="#94a3b8" font-family="sans-serif" font-size="12">Wszystkie aktywne zmiany zapisywane automatycznie.</text>
  <!-- Interactive Buttons inside card mock -->
  <rect x="325" y="295" width="160" height="32" rx="8" fill="#0284c7" />
  <text x="350" y="315" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="11">Pobierz z G-Drive</text>

  <!-- Card #2 Right -->
  <rect x="775" y="115" width="475" height="230" rx="16" fill="#0f172a" stroke="#1e293b" stroke-width="2" />
  <text x="805" y="155" fill="#38bdf8" font-family="sans-serif" font-weight="bold" font-size="12" letter-spacing="1.5">INSTALACJA APLIKACJI (PWA)</text>
  <text x="805" y="195" fill="#ffffff" font-family="sans-serif" font-weight="800" font-size="18">Dodaj program do ekranu komputera</text>
  <text x="805" y="230" fill="#94a3b8" font-family="sans-serif" font-size="11.5" font-weight="500">
    Aplikacja PWA uruchamia się błyskawicznie bezpośrednio z pulpitu,
  </text>
  <text x="805" y="250" fill="#94a3b8" font-family="sans-serif" font-size="11.5" font-weight="500">
    reaguje na zmiany bez opóźnień sieciowych i oszczędza transfer.
  </text>
  
  <rect x="805" y="285" width="240" height="40" rx="10" fill="#059669" />
  <text x="840" y="310" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="11">🚀 ZAINSTALUJ NA URZĄDZENIU</text>

  <!-- Lower Terminal Output Logs mockup panel -->
  <rect x="295" y="375" width="955" height="310" rx="16" fill="#020617" stroke="#1e293b" stroke-width="1.5" />
  <rect x="295" y="375" width="955" height="40" rx="16" fill="#090d16" />
  <text x="325" y="401" fill="#64748b" font-family="sans-serif" font-weight="bold" font-size="11" letter-spacing="1">KONSOLA DIAGNOSTYCZNA URZĄDZENIA</text>
  
  <!-- Log output rows -->
  <text x="325" y="445" fill="#22c55e" font-family="monospace" font-size="11">[11:51:24] [PWA] Service Worker pomyślnie zainicjowany.</text>
  <text x="325" y="475" fill="#38bdf8" font-family="monospace" font-size="11">[11:52:01] [AUTO-SYNC] Szybka synchronizacja: pobieranie bazy danych z chmury...</text>
  <text x="325" y="505" fill="#e2e8f0" font-family="monospace" font-size="11">[11:52:03] [DATABASE] Udany zapis lokalny: 12 kategorii, 84 pozycji jedzeniowych.</text>
  <text x="325" y="535" fill="#ea580c" font-family="monospace" font-size="11">[11:53:11] [PWA] Wykryto brak połączenia i bezproblemowo włączono tryb OFFLINE.</text>
  <text x="325" y="565" fill="#22c55e" font-family="monospace" font-size="11">[11:53:55] [OK] Baza danych gotowa do pracy gastro.</text>
</svg>
