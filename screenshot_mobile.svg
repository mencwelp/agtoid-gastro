<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 960" width="100%" height="100%">
  <!-- Background -->
  <rect width="540" height="960" fill="#090d16" />
  
  <!-- Subtle Grid Header -->
  <rect x="0" y="0" width="540" height="120" fill="#0f172a" />
  
  <!-- Status bar mockup -->
  <rect x="15" y="8" width="8" height="8" rx="2" fill="#38bdf8" opacity="0.6"/>
  <rect x="28" y="8" width="8" height="8" rx="2" fill="#38bdf8" opacity="0.6"/>
  <text x="490" y="16" fill="#64748b" font-family="monospace" font-size="10">99%</text>

  <!-- Title & Branding -->
  <text x="30" y="60" fill="#ffffff" font-family="sans-serif" font-weight="900" font-size="22" letter-spacing="1">COMPRAS GASTRO</text>
  <text x="30" y="85" fill="#38bdf8" font-family="sans-serif" font-weight="600" font-size="11" letter-spacing="0.5">ZARZĄDZANIE ZAMÓWIENIAMI</text>

  <!-- Connection Badge -->
  <rect x="420" y="47" width="90" height="24" rx="12" fill="#0369a1" />
  <circle cx="435" cy="59" r="4" fill="#34d399" />
  <text x="446" y="64" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="10">SYNCHRON</text>

  <g transform="translate(0, 10)">
    <!-- Active Orders Box -->
    <rect x="30" y="140" width="480" height="180" rx="16" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>
    <text x="50" y="180" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="15">Aktywne zamówienia</text>
    <text x="450" y="180" fill="#38bdf8" font-family="sans-serif" font-weight="bold" font-size="18">0</text>
    <line x1="50" y1="205" x2="490" y2="205" stroke="#334155" stroke-dasharray="4 4" />
    <text x="50" y="240" fill="#94a3b8" font-family="sans-serif" font-size="12">Kategorie artykułów:</text>
    <text x="50" y="265" fill="#38bdf8" font-family="sans-serif" font-weight="bold" font-size="14">🥬 Warzywa, 🥩 Mięsa, 🍞 Chleb</text>
    <rect x="50" y="285" width="440" height="6" rx="3" fill="#1e293b"/>
    <rect x="50" y="285" width="220" height="6" rx="3" fill="#0ea5e9"/>
  </g>

  <!-- PWA Status Banner mockup -->
  <g transform="translate(0, 310)">
    <rect x="30" y="40" width="480" height="340" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
    <text x="55" y="80" fill="#38bdf8" font-family="sans-serif" font-weight="bold" font-size="13" letter-spacing="1">Aplikacja PWA</text>
    <text x="55" y="110" fill="#ffffff" font-family="sans-serif" font-weight="800" font-size="18">Praca offline i pulpit</text>
    <text x="55" y="140" fill="#94a3b8" font-family="sans-serif" font-size="13">Zainstaluj aplikację na telefonie, aby:</text>
    
    <circle cx="65" cy="178" r="5" fill="#4ade80" />
    <text x="85" y="182" fill="#e2e8f0" font-family="sans-serif" font-size="13">Działać szybciej bez przeglądarki</text>
    
    <circle cx="65" cy="218" r="5" fill="#4ade80" />
    <text x="85" y="222" fill="#e2e8f0" font-family="sans-serif" font-size="13">Korzystać bez internetu w kuchni</text>

    <circle cx="65" cy="258" r="5" fill="#4ade80" />
    <text x="85" y="262" fill="#e2e8f0" font-family="sans-serif" font-size="13">Mieć ikonę 🥬 na pulpicie telefonu</text>

    <!-- App logo decoration inside card -->
    <path d="M 400,280 C 375,280 365,305 385,335 C 405,365 440,365 450,335 C 460,305 445,280 420,280 Z" fill="#22c55e" opacity="0.3" />
    <path d="M 360,330 L 460,330 L 440,390 L 380,390 Z" fill="#0ea5e9" opacity="0.5" />
  </g>

  <!-- Navigation bar mockup -->
  <rect x="0" y="880" width="540" height="80" fill="#0a0f1d" stroke-top="#1e293b" />
  <text x="70" y="920" fill="#38bdf8" font-family="sans-serif" font-weight="bold" font-size="11">🛒 Pedido</text>
  <text x="200" y="920" fill="#64748b" font-family="sans-serif" font-size="11">📦 Catalogo</text>
  <circle cx="270" cy="915" r="3" fill="#64748b" opacity="0" />
  <text x="320" y="920" fill="#64748b" font-family="sans-serif" font-size="11">📁 Categoria</text>
  <text x="440" y="920" fill="#64748b" font-family="sans-serif" font-size="11">⚙️ Cloud</text>
</svg>
